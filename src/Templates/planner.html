<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tasking. | Planner</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header class="navbar">
        <h1 class="logo">Tasking</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="planner.html">Planner</a>
        </nav>
    </header>

    <main class="planner-page">
        <section class="planner-header">
            <h2>My Planner</h2>
            <p>Write down your tasks for today.</p>
        </section>

        <section class="todo-container centered-planner">
            <div class="todo-card planner-form-card">
                <h3>Today's Tasks</h3>

                <form class="task-form">
                    <input type="text" placeholder="Enter task 1">
                    <input type="text" placeholder="Enter task 2">
                    <input type="text" placeholder="Enter task 3">
                    <input type="text" placeholder="Enter task 4">
                    <input type="text" placeholder="Enter task 5">

                    <textarea placeholder="Write notes or reminders here..."></textarea>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2026 tasking.</p>
    </footer>
</body>
</html>
